name: "Kyomiru CI/CD"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Inject AniList Secrets
        env:
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}
        run: |
          if [ -z "$ANILIST_CLIENT_ID" ] || [ -z "$ANILIST_CLIENT_SECRET" ]; then
            echo "AniList secrets missing. Using placeholders to keep CI green."
            ANILIST_CLIENT_ID="0"
            ANILIST_CLIENT_SECRET="placeholder"
          fi
          /usr/libexec/PlistBuddy -c "Set :ANILIST_CLIENT_ID $ANILIST_CLIENT_ID" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :ANILIST_CLIENT_SECRET $ANILIST_CLIENT_SECRET" Resources/Info.plist

      - name: Inject OMDb API Key
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: |
          if [ -z "$OMDB_API_KEY" ]; then
            echo "OMDb API key missing. Using placeholder to keep CI green."
            OMDB_API_KEY="CHANGE_ME"
          fi
          /usr/libexec/PlistBuddy -c "Set :OMDB_API_KEY $OMDB_API_KEY" Resources/Info.plist

      - name: Inject TVDB API Key
        env:
          TVDB_API_KEY: ${{ secrets.TVDB_API_KEY }}
        run: |
          if [ -z "$TVDB_API_KEY" ]; then
            echo "TVDB API key missing. Using placeholder to keep CI green."
            TVDB_API_KEY="CHANGE_ME"
          fi
          /usr/libexec/PlistBuddy -c "Set :TVDB_API_KEY $TVDB_API_KEY" Resources/Info.plist

      - name: Lint String Interpolation
        run: |
          python3 scripts/lint_interpolation.py

      - name: Install CocoaPods Dependencies
        run: |
          gem install cocoapods
          pod install

      - name: Build Archive (Unsigned)
        run: |
          set -e
          for attempt in 1 2; do
            xcodebuild archive \
              -workspace Kyomiru.xcworkspace \
              -scheme Kyomiru \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath $RUNNER_TEMP/DerivedData \
              -archivePath $PWD/Kyomiru.xcarchive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              AD_HOC_CODE_SIGNING_ALLOWED=YES \
              COMPILER_INDEX_STORE_ENABLE=NO \
              ALWAYS_SEARCH_USER_PATHS=NO \
              SWIFT_USE_INTEGRATED_DRIVER=NO \
              ONLY_ACTIVE_ARCH=NO && break
            echo "xcodebuild failed on attempt $attempt"
            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi
            rm -rf ~/Library/Developer/Xcode/DerivedData
            rm -rf $RUNNER_TEMP/DerivedData
          done

      - name: Prepare IPA (Sideload Ready)
        run: |
          rm -rf Payload
          mkdir -p Payload
          cp -r Kyomiru.xcarchive/Products/Applications/*.app Payload/
          zip -r Kyomiru_Unsigned.ipa Payload

      - name: Create Sideload Zip
        run: |
          zip -r Kyomiru-Sideload-Build.zip Kyomiru_Unsigned.ipa

      - name: Compute Build Metadata
        id: buildmeta
        run: |
          SHORT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Resources/Info.plist)
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Resources/Info.plist)
          TAG="v${SHORT_VERSION}-build.${BUILD_NUMBER}"
          DATE_ISO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IPA_SIZE=$(stat -f%z Kyomiru_Unsigned.ipa)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "short_version=$SHORT_VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date_iso=$DATE_ISO" >> $GITHUB_OUTPUT
          echo "ipa_size=$IPA_SIZE" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Update source.json
        run: |
          jq \
            --arg version "${{ steps.buildmeta.outputs.short_version }}-build.${{ steps.buildmeta.outputs.build_number }}" \
            --arg date "${{ steps.buildmeta.outputs.date_iso }}" \
            --arg size "${{ steps.buildmeta.outputs.ipa_size }}" \
            --arg news "${{ steps.buildmeta.outputs.commit_msg }}" \
            --arg url "https://github.com/squidy320/kyomiru_swift/releases/latest/download/Kyomiru_Unsigned.ipa" \
            '(.apps[0].version) = $version
             | (.apps[0].date) = $date
             | (.apps[0].size) = ($size | tonumber)
             | (.apps[0].downloadURL) = $url
             | (.news) = [{title:"What'\''s New", date:$date, text:$news}]' \
            source.json > source.json.tmp
          mv source.json.tmp source.json

      - name: Commit source.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update source.json [skip ci]"
          file_pattern: source.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.buildmeta.outputs.tag }}
          name: ${{ steps.buildmeta.outputs.tag }}
          body: ${{ steps.buildmeta.outputs.commit_msg }}
          files: |
            Kyomiru_Unsigned.ipa
            Kyomiru-Sideload-Build.zip
