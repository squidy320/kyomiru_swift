name: "Build Unsigned Kyomiru"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project Kyomiru.xcodeproj \
            -scheme Kyomiru \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/Kyomiru.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Prepare IPA (Sideload Ready)
        run: |
          mkdir -p Payload
          # Find the .app folder inside the archive and copy it
          cp -r Kyomiru.xcarchive/Products/Applications/*.app Payload/
          zip -r Kyomiru_Unsigned.ipa Payload
          
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Kyomiru-Sideload-Build
          path: Kyomiru_Unsigned.ipa
