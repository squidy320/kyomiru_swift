name: "Build Unsigned Kyomiru"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Inject AniList Secrets
        env:
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}
        run: |
          if [ -z "$ANILIST_CLIENT_ID" ] || [ -z "$ANILIST_CLIENT_SECRET" ]; then
            echo "AniList secrets missing. Using placeholders to keep CI green."
            ANILIST_CLIENT_ID="0"
            ANILIST_CLIENT_SECRET="placeholder"
          fi
          /usr/libexec/PlistBuddy -c "Set :ANILIST_CLIENT_ID $ANILIST_CLIENT_ID" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :ANILIST_CLIENT_SECRET $ANILIST_CLIENT_SECRET" Resources/Info.plist

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Kyomiru.xcodeproj \
            -scheme Kyomiru

      - name: Lint String Interpolation
        run: |
          python3 scripts/lint_interpolation.py

      - name: Build Archive (Unsigned)
        run: |
          set -e
          for attempt in 1 2; do
            xcodebuild archive \
              -project Kyomiru.xcodeproj \
              -scheme Kyomiru \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath $RUNNER_TEMP/DerivedData \
              -archivePath $PWD/Kyomiru.xcarchive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              AD_HOC_CODE_SIGNING_ALLOWED=YES \
              COMPILER_INDEX_STORE_ENABLE=NO \
              ALWAYS_SEARCH_USER_PATHS=NO \
              SWIFT_USE_INTEGRATED_DRIVER=NO \
              ONLY_ACTIVE_ARCH=NO && break
            echo "xcodebuild failed on attempt $attempt"
            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi
            rm -rf ~/Library/Developer/Xcode/DerivedData
            rm -rf $RUNNER_TEMP/DerivedData
          done

      - name: Prepare IPA (Sideload Ready)
        run: |
          mkdir -p Payload
          # Find the .app folder inside the archive and copy it
          cp -r Kyomiru.xcarchive/Products/Applications/*.app Payload/
          zip -r Kyomiru_Unsigned.ipa Payload
          
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Kyomiru-Sideload-Build
          path: Kyomiru_Unsigned.ipa
