name: "Build Local MPV"

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "MPV build variant"
        required: true
        default: "lgpl"
        type: choice
        options:
          - lgpl
          - gpl
      commit_to_repo:
        description: "Commit Vendor/MPVKit/Local back to main"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-local-mpv:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Reset Local MPV Output
        run: |
          rm -rf Vendor/MPVKit/Local

      - name: Build Local MPV Artifacts
        run: |
          chmod +x scripts/build-mpv.sh
          chmod +x scripts/expand-local-mpv-xcframework-zips.sh
          chmod +x scripts/check-local-mpv.sh
          chmod +x scripts/prepare-local-mpv-frameworks.sh
          ./scripts/prepare-local-mpv-frameworks.sh
          ./scripts/expand-local-mpv-xcframework-zips.sh
          ./scripts/check-local-mpv.sh

      - name: Package Local MPV Artifacts
        run: |
          cd Vendor/MPVKit
          zip -r "$RUNNER_TEMP/Kyomiru-MPV-${{ inputs.variant }}.zip" Local

      - name: Commit Vendored MPV Frameworks
        if: ${{ inputs.commit_to_repo }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Vendor/MPVKit/Local
          if git diff --cached --quiet; then
            echo "No vendored MPV changes to commit."
            exit 0
          fi
          git commit -m "Vendor local MPV (${{ inputs.variant }}) [skip ci]"
          git push origin HEAD:main

      - name: Upload Local MPV Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kyomiru-MPV-${{ inputs.variant }}
          path: ${{ runner.temp }}/Kyomiru-MPV-${{ inputs.variant }}.zip
          if-no-files-found: error
